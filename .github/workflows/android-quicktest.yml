name: Android Quicktest

on:
  pull_request:
    branches: [ main ]

jobs:
  android-quicktest:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install kea2
      run: |
        python -m pip install --upgrade pip
        pip install .

    - name: Enable KVM
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Run quicktest on Android emulator
      continue-on-error: true
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 36
        script: |
          ./gradlew connectedCheck

          kea2 init
          set +e
          python3 quicktest.py
          rc=$?
          set -e

          echo "quicktest return code: ${rc}"
          if [[ "${rc}" =~ ^[0-3]$ ]]; then
            echo "Return code is valid (0,1,2,3)."
            exit 0
          fi
          echo "Invalid return code: ${rc}. Expected one of 0,1,2,3."
          exit 1
